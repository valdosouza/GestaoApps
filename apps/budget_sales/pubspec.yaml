name: budget_sales
description: Budget Sales Application - Sales budget management with core ERP integration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core compartilhado
  core:
    path: ../../core

  # State management
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6

  # Navigation
  go_router: ^14.0.0

  # UI
  flutter_modular: ^5.0.3
  modular_bloc_bind: ^1.0.1

  # HTTP
  http: ^1.6.0

  # Database (Drift)
  drift: ^2.28.1

  # QR Code / Mobile Scanner
  mobile_scanner: ^7.2.0

  # Funcional (usado pelo core/modules)
  equatable: ^2.0.8
  dartz: ^0.10.1

  # Storage (usado pelo auth)
  shared_preferences: ^2.5.3

  # Utilitários
  intl: ^0.20.2
  logger: ^2.6.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

  # Testing
  mocktail: ^1.0.4

  # Code generation (para json_serializable)
  build_runner: ^2.11.1
  json_serializable: ^6.11.2

flutter:
  uses-material-design: true

  # Assets
  # assets:
  #   - assets/
