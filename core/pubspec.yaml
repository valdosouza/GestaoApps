name: core
description: Módulo core compartilhado para aplicativos ERP - contém Auth, ERP Integration, Common Components
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # DI e rotas
  flutter_modular: ^5.0.3
  modular_bloc_bind: ^1.0.1
  injectable: ^2.7.1

  # Estado
  bloc: ^8.1.4
  flutter_bloc: ^8.1.6
  equatable: ^2.0.8

  # Funcional
  dartz: ^0.10.1

  # HTTP
  http: ^1.6.0
  crypto: ^3.0.6

  # Utilitários
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  logger: ^2.6.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  firebase_performance: ^0.10.1+10

  # QR Code / Mobile Scanner
  mobile_scanner: ^7.2.0

  # Database (Drift)
  drift: ^2.28.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.1
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Testing
  mocktail: ^1.0.4
  mockito: ^5.6.3

  # Code generation
  build_runner: ^2.11.1
  json_serializable: ^6.11.2
  drift_dev: ^2.28.1
  injectable_generator: ^2.7.1

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
