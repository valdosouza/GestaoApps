name: core
description: Módulo core compartilhado para aplicativos ERP - contém Auth, ERP Integration, Common Components
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  bloc: ^8.1.4
  crypto: ^3.0.6
  dartz: ^0.10.1
  drift: ^2.28.1
  drift_flutter: ^0.2.4
  equatable: ^2.0.8
  firebase_analytics: ^11.6.0
  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.3.10
  firebase_performance: ^0.10.1+10
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.6
  flutter_localizations:
    sdk: flutter
  flutter_modular: ^5.0.3
  http: ^1.6.0
  injectable: ^2.7.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logger: ^2.6.2
  mobile_scanner: ^7.2.0
  modular_bloc_bind: ^1.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  sqlite3_flutter_libs: ^0.5.29

dev_dependencies:
  build_runner: ^2.11.1
  drift_dev: ^2.28.1
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.7.1
  integration_test:
    sdk: flutter
  json_serializable: ^6.11.2
  mockito: ^5.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - images/
    - images/logomarca.png
    - images/logoprogress.png
